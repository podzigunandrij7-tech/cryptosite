<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CryptoLab — Trust Is The New Currency</title>
  <meta name="description" content="Dark theme crypto landing with live crypto prices." />
  
  <!-- Fonts & Libraries -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header" id="header">
    <div class="container nav">
      <a class="logo" href="#"><span class="logo-dot"></span>CryptoLab</a>
      
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu"><span></span></button>
      
      <nav class="menu" id="menu">
        <a class="nav-pill" href="#">Features</a>
        <a class="nav-pill" href="#">Markets</a>
        <a class="nav-pill" href="#">Tools</a>
        <a class="nav-pill" href="#">Learn</a>
        <a class="nav-pill" href="#">About</a>
      </nav>
      
      <div class="actions">
        <a class="btn ghost auth-link" href="#">Login</a>
        <a class="btn primary auth-link" href="#">Sign up</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container hero-inner glass">
      <div class="hero-copy">
        <h1>Trust Is The <span class="accent">New Currency</span></h1>
        <p>We build tools for cryptocurrency analytics: charts, live prices, mining calculators and exchange integrations.</p>
        <div class="cta">
          <a class="btn cta-btn" href="#">Get Started</a>
          <a class="btn ghost" href="#">Documentation</a>
        </div>
      </div>
      
      <div class="coins">
        <div class="coin coin-btc"></div>
        <div class="coin coin-eth"></div>
        <div class="coin coin-sol"></div>
      </div>
    </div>
  </section>

  <section class="cards-section">
    <div class="container">
      <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="cards-container">
          <!-- JS dynamic content -->
        </div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
      </div>
    </div>
  </section>

  <section class="charts-section">
    <div class="container">
      <h2>Market Charts</h2>
      <div class="charts-grid">
        <div class="chart-container">
          <iframe src="https://s.tradingview.com" loading="lazy" width="100%" height="400" frameborder="0"></iframe>
        </div>
        <div class="chart-container">
          <iframe src="https://s.tradingview.com" loading="lazy" width="100%" height="400" frameborder="0"></iframe>
        </div>
        <div class="chart-container">
          <iframe src="https://s.tradingview.com" loading="lazy" width="100%" height="400" frameborder="0"></iframe>
        </div>
        <div class="chart-container">
          <iframe src="https://s.tradingview.com" loading="lazy" width="100%" height="400" frameborder="0"></iframe>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> CryptoLab. Powered by CoinGecko & Binance.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net"></script>
  <script src="script.js"></script>
</body>
</html>
