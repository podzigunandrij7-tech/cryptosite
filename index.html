<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CryptoLab — Trust Is The New Currency</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net" />
</head>
<body>

  <header class="site-header">
    <div class="container nav">
      <a class="logo" href="#"><span class="logo-dot"></span>CryptoLab</a>
      
      <button class="burger" id="burger-menu">☰</button>

      <nav class="menu" id="nav-menu">
        <a class="nav-pill" href="#">Features</a>
        <a class="nav-pill" href="#">Markets</a>
        <a class="nav-pill" href="#">Tools</a>
        <a class="nav-pill" href="#">About</a>
      </nav>

      <div class="actions pc-only">
        <a class="btn ghost" href="#">Login</a>
        <a class="btn primary" href="#">Sign up</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container hero-inner">
      <div class="hero-copy">
        <h1>Trust Is The <span class="accent">New Currency</span></h1>
        <p>We build tools for cryptocurrency analytics: live prices and professional charts.</p>
        <div class="cta">
          <a class="btn primary" href="#">Get Started</a>
        </div>
      </div>
    </div>
  </section>

  <section class="cards-section">
    <div class="container">
      <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="cards-container">
          <!-- Сюди JS вставить картки -->
        </div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
      </div>
    </div>
  </section>

  <section class="charts container">
    <h2>Market Charts</h2>
    <div class="charts-grid">
      <div class="chart-box"><iframe src="https://s.tradingview.com" width="100%" height="400" frameborder="0"></iframe></div>
      <div class="chart-box"><iframe src="https://s.tradingview.com" width="100%" height="400" frameborder="0"></iframe></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container"><p>© 2024 CryptoLab. Powered by Binance API.</p></div>
  </footer>

  <script src="https://cdn.jsdelivr.net"></script>
  <script src="js/script.js"></script>
