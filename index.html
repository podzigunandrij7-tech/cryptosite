<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Landing</title>
  <link href="styles.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="logo">CryptoBoard</div>
    <nav class="nav">
      <a href="#" class="nav-link">Home</a>
      <a href="#" class="nav-link">Markets</a>
      <a href="#" class="nav-link">Tools</a>
      <a href="#" class="nav-link">Blog</a>
      <a href="#" class="nav-link">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>We build tools for crypto traders</h1>
    </section>

    <section class="carousel-section">
      <h2 class="section-title">Top 30 Cryptos</h2>
      <div class="carousel-container">
        <button class="carousel-btn prev">&#10094;</button>
        <div class="carousel-track" id="carousel-track">
          <!-- Картки підтягуються через JS -->
        </div>
        <button class="carousel-btn next">&#10095;</button>
      </div>
    </section>

    <section class="charts-section">
      <h2 class="section-title centered">Market Charts</h2>
      <div class="charts-grid">
        <div class="tradingview-widget-container">
          <div id="tradingview_btc"></div>
        </div>
        <div class="tradingview-widget-container">
          <div id="tradingview_eth"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
